
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Shop</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>My Online Store</h1>
    <p>Best deals in UAE 🇦🇪</p>
  </header>

  <!-- PRODUCTS -->
  <section class="products">

    <div class="product">
      <h3>iPhone 14</h3>
      <p>AED 2500</p>
      <button onclick="addToCart('iPhone 14', 2500)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Samsung TV</h3>
      <p>AED 1800</p>
      <button onclick="addToCart('Samsung TV', 1800)">Add to Cart</button>
    </div>

    <div class="product">
      <h3>Headphones</h3>
      <p>AED 200</p>
      <button onclick="addToCart('Headphones', 200)">Add to Cart</button>
    </div>

  </section>
	<section class="cart">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3 id="total">Total: AED 0</h3>
</section>

</body>
  <script>
  let cart = [];

  function addToCart(productName, price) {
    cart.push({ name: productName, price: price });
    alert(productName + " added to cart");
    console.log(cart);
  }
</script>
</html>
